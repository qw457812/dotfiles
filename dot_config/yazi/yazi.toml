# https://github.com/sxyazi/yazi/blob/shipped/yazi-config/preset/yazi-default.toml
# https://yazi-rs.github.io/docs/configuration/yazi

#:schema https://yazi-rs.github.io/schemas/yazi.json

[mgr]
show_hidden = true

[opener]
zathura = [
  { run = 'zathura "$@"', orphan = true, desc = "zathura", for = "unix" },
]

[open]
prepend_rules = [
  { mime = "application/pdf", use = [
    "zathura",
    "open",
    "reveal",
  ] },
]

[plugin]
prepend_fetchers = [
  # https://github.com/yazi-rs/plugins/tree/main/git.yazi
  # TODO: remove `id` once Termux ships yazi >= 26.5.6
  #  `id` was renamed to `group` in 26.5.6 (sxyazi/yazi#3943)
  #  yazi < 26.5.6 ignores unknown `group`, yazi >= 26.5.6 ignores unknown `id`
  { id = "git", url = "*", run = "git", group = "git" },
  { id = "git", url = "*/", run = "git", group = "git" },
]
