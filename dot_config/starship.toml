[git_branch]
symbol = "´Éİ "
format = '[$branch(:$remote_branch)]($style) '

# https://github.com/folke/snacks.nvim/blob/7964f040bf605b2a3e8d66d02c453469352e005e/lua/snacks/picker/source/git.lua#L412-L468
[git_status]
untracked = '[?$count](bold blue) '
staged = '[++$count](bold green) '
stashed = "[´ââ ](cyan) "
deleted = '[D$count](bold red) '
modified = '[M$count](bold yellow) '
renamed = '[R$count](bold 136) '
conflicted = '[!$count](bold red) '
behind = '[Ôçú${count}](bold purple) '
ahead = '[Ôçí${count}](bold purple) '
diverged = '[ÔçòÔçí${ahead_count}Ôçú${behind_count}](bold purple) '
format = '([$all_status$ahead_behind]($style))'

[git_metrics]
disabled = false

