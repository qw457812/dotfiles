# https://github.com/openai/codex/blob/main/docs/config.md

# TODO: https://github.com/openai/codex-plugin-cc

# # https://openrouter.ai/docs/guides/guides/codex-cli
# model_provider = "openrouter"
# model = "openai/gpt-5.4"

model = "gpt-5.5"

model_reasoning_effort = "medium"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
personality = "pragmatic"

# notify = ["python3", "/Users/xingyuqiang/.codex/notify.py"]

[model_providers.openrouter]
name = "OpenRouter"
base_url = "https://openrouter.ai/api/v1"
env_key = "CODEX_OPENROUTER_API_KEY"

[mcp_servers.context7]
args = ["-y", "@upstash/context7-mcp"]
command = "npx"
enabled = false

[tui]
status_line = ["model-with-reasoning", "fast-mode", "total-input-tokens", "total-output-tokens", "context-used", "five-hour-limit", "weekly-limit", "task-progress", "codex-version"]

[features]
prevent_idle_sleep = true
external_migration = true

[notice]
hide_rate_limit_model_nudge = true
